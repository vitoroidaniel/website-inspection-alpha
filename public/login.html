<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Kurtex — Sign In</title>
<link rel="icon" type="image/x-icon" href="/img/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png">
<link rel="apple-touch-icon" href="/img/apple-touch-icon.png">
<meta name="theme-color" content="#1e4da1">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css">
<style>

  /* Fullscreen truck background */

    position: fixed; inset: 0; z-index: 0;
    background:
      linear-gradient(to bottom, rgba(10,20,50,0.62) 0%, rgba(10,20,50,0.78) 100%),

,420 800,180 1000,420'/%3E%3Cpolygon fill='%230f1e38' points='850,420 1050,210 1200,420'/%3E%3C!-- Snow caps --%3E%3Cpolygon fill='%23e2e8f0' points='150,200 175,240 125,240' opacity='.6'/%3E%3Cpolygon fill='%23e2e8f0' points='280,160 310,205 250,205' opacity='.5'/%3E%3Cpolygon fill='%23e2e8f0' points='800,180 832,225 768,225' opacity='.6'/%3E%3C!-- TRUCK --%3E%3C!-- Trailer body --%3E%3Crect fill='%231e3a6e' x='120' y='300' width='580' height='120' rx='6'/%3E%3Crect fill='%2316305e' x='120' y='296' width='580' height='12' rx='4'/%3E%3C!-- Trailer stripe --%3E%3Crect fill='%231e4da1' x='120' y='340' width='580' height='14'/%3E%3Crect fill='%237c4a1e' x='120' y='354' width='580' height='7'/%3E%3C!-- Trailer doors --%3E%3Crect fill='%23162d5a' x='680' y='306' width='14' height='108' rx='3'/%3E%3Crect fill='%23243d6e' x='686' y='310' width='2' height='100' rx='1'/%3E%3C!-- Trailer lights rear --%3E%3Crect fill='%23ef4444' x='696' y='310' width='8' height='16' rx='2'/%3E%3Crect fill='%23ef4444' x='696' y='396' width='8' height='16' rx='2'/%3E%3C!-- Cab --%3E%3Crect fill='%231e4da1' x='700' y='310' width='180' height='110' rx='10'/%3E%3C!-- Cab windshield --%3E%3Crect fill='%23a8c4f0' x='716' y='322' width='130' height='64' rx='6' opacity='.85'/%3E%3C!-- Cab side window --%3E%3Crect fill='%23a8c4f0' x='852' y='328' width='22' height='42' rx='4' opacity='.7'/%3E%3C!-- Cab door line --%3E%3Cline x1='830' y1='316' x2='830' y2='420' stroke='%23163d85' stroke-width='2'/%3E%3C!-- Cab lights front --%3E%3Crect fill='%23fef08a' x='876' y='344' width='18' height='10' rx='3'/%3E%3Crect fill='%23fef08a' x='876' y='380' width='18' height='8' rx='2' opacity='.7'/%3E%3C!-- Exhaust stack --%3E%3Crect fill='%23334155' x='858' y='272' width='10' height='42' rx='5'/%3E%3Cellipse fill='%23475569' cx='863' cy='272' rx='6' ry='4'/%3E%3C!-- Smoke --%3E%3Ccircle fill='%23475569' cx='863' cy='258' r='8' opacity='.4'/%3E%3Ccircle fill='%23475569' cx='867' cy='244' r='6' opacity='.25'/%3E%3Ccircle fill='%23475569' cx='862' cy='232' r='4' opacity='.15'/%3E%3C!-- Wheels trailer --%3E%3Ccircle fill='%23111827' cx='220' cy='420' r='36'/%3E%3Ccircle fill='%231f2937' cx='220' cy='420' r='24'/%3E%3Ccircle fill='%23374151' cx='220' cy='420' r='10'/%3E%3Ccircle fill='%23111827' cx='330' cy='420' r='36'/%3E%3Ccircle fill='%231f2937' cx='330' cy='420' r='24'/%3E%3Ccircle fill='%23374151' cx='330' cy='420' r='10'/%3E%3Ccircle fill='%23111827' cx='560' cy='420' r='36'/%3E%3Ccircle fill='%231f2937' cx='560' cy='420' r='24'/%3E%3Ccircle fill='%23374151' cx='560' cy='420' r='10'/%3E%3Ccircle fill='%23111827' cx='660' cy='420' r='36'/%3E%3Ccircle fill='%231f2937' cx='660' cy='420' r='24'/%3E%3Ccircle fill='%23374151' cx='660' cy='420' r='10'/%3E%3C!-- Wheels cab --%3E%3Ccircle fill='%23111827' cx='760' cy='420' r='36'/%3E%3Ccircle fill='%231f2937' cx='760' cy='420' r='24'/%3E%3Ccircle fill='%23374151' cx='760' cy='420' r='10'/%3E%3Ccircle fill='%23111827' cx='850' cy='420' r='36'/%3E%3Ccircle fill='%231f2937' cx='850' cy='420' r='24'/%3E%3Ccircle fill='%23374151' cx='850' cy='420' r='10'/%3E%3C!-- Ground reflection --%3E%3Cellipse fill='%231e4da1' cx='500' cy='456' rx='380' ry='8' opacity='.12'/%3E%3C/svg%3E") center center / cover no-repeat;
  }

  /* Page layout */
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .hdr { display: none; }
  footer { position: relative; z-index: 1; background: transparent; border: none; }
  footer span { color: rgba(255,255,255,0.35); }

  main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 16px 12px;
    position: relative; z-index: 1;
  }

  /* Logo above card */
  .login-logo {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    margin-bottom: 20px;
  }
  .login-logo img {
    width: 64px; height: 64px; border-radius: 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .login-logo-name {
    font-size: 28px; font-weight: 900; color: #fff;
    letter-spacing: -0.8px; text-shadow: 0 2px 12px rgba(0,0,0,0.4);
  }
  .login-logo-sub {
    font-size: 12px; color: rgba(255,255,255,0.5);
    font-weight: 500; margin-top: -6px;
  }

  /* Card glassmorphism on dark bg */
  .card {
    background: rgba(255,255,255,0.97);
    box-shadow: 0 24px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.1);
    max-width: 400px;
  }
</style>
</head>
<body>

<!-- Fullscreen truck background -->
<div class="login-bg"></div>

<header class="hdr"></header>

<main>
  <!-- Logo centered above card -->
  <div class="login-logo">
    <img src="img/logo-inspection.png" alt="Kurtex logo">
    <div class="login-logo-name">Kurtex</div>
    <div class="login-logo-sub">by Rekka Software</div>
  </div>

  <div class="card">
    <!-- Welcome Banner -->
    <div class="login-welcome">
      <div class="login-welcome-title">Welcome back 👋</div>
      <div class="login-welcome-sub">Kurtex Fleet Inspection System</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tabDriver" onclick="setTab('driver')">
        <span class="material-icons-round" style="font-size:16px">local_shipping</span>Driver
      </button>
      <button class="tab-btn" id="tabAgent" onclick="setTab('agent')">
        <span class="material-icons-round" style="font-size:16px">assignment_ind</span>Dispatcher
      </button>
    </div>

    <div class="card-body">

      <!-- DRIVER PANEL -->
      <div class="panel active" id="panelDriver">
        <div class="panel-title">Driver Login</div>
        <div class="panel-sub">Sign in to start your vehicle inspection.</div>

        <div class="field">
          <label>Telegram Username</label>
          <input type="text" id="dUser" autocapitalize="none" autocomplete="username" placeholder="@username or username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="dPass" autocomplete="current-password" placeholder="Your password">
        </div>
        <label class="keep-row">
          <input type="checkbox" id="dKeep">
          <div class="keep-box"><svg viewBox="0 0 14 14" fill="none"><polyline points="2,7 5.5,10.5 12,3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="keep-label">Keep me signed in for 30 days</span>
        </label>

        <button class="btn-primary" id="dLoginBtn" onclick="loginDriver()">
          <span class="material-icons-round" style="font-size:20px">rocket_launch</span>
          <span id="dLoginTxt">Start Inspection</span>
        </button>

        <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>

        <button class="btn-bio" id="dBioBtn" onclick="biometricLogin('driver')" style="display:none">
          <div class="faceid-icon">
            <span class="material-icons-round bio-icon">face</span>
          </div>
          <div class="bio-label">
            <span id="dBioLabel">Face ID</span>
            <span>Quick biometric sign in</span>
          </div>
          <span class="material-icons-round" style="font-size:18px;color:var(--muted);margin-left:auto">chevron_right</span>
        </button>

        <div class="err-box" id="dErr"></div>
      </div>

      <!-- AGENT PANEL -->
      <div class="panel" id="panelAgent">
        <div class="panel-title">Welcome back</div>
        <div class="panel-sub">Sign in with your dispatcher or admin credentials.</div>

        <div class="field">
          <label>Telegram Username</label>
          <input type="text" id="aUser" autocapitalize="none" autocomplete="username" placeholder="@username or username">
        </div>
        <div class="field">
          <label>Password</label>
          <input type="password" id="aPass" autocomplete="current-password" placeholder="Your password">
        </div>
        <label class="keep-row">
          <input type="checkbox" id="aKeep">
          <div class="keep-box"><svg viewBox="0 0 14 14" fill="none"><polyline points="2,7 5.5,10.5 12,3" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <span class="keep-label">Keep me signed in for 30 days</span>
        </label>

        <button class="btn-primary" id="aLoginBtn" onclick="loginAgent()">
          <span class="material-icons-round" style="font-size:20px">login</span>
          <span id="aLoginTxt">Sign In</span>
        </button>

        <div class="divider"><div class="divider-line"></div><span>or</span><div class="divider-line"></div></div>

        <button class="btn-bio" id="aBioBtn" onclick="biometricLogin('agent')" style="display:none">
          <div class="faceid-icon">
            <span class="material-icons-round bio-icon">face</span>
          </div>
          <div class="bio-label">
            <span id="aBioLabel">Face ID</span>
            <span>Quick biometric sign in</span>
          </div>
          <span class="material-icons-round" style="font-size:18px;color:var(--muted);margin-left:auto">chevron_right</span>
        </button>

        <div class="err-box" id="aErr"></div>
        <!-- hint-box removed for production -->
      </div>

    </div>
  </div>
</main>

<footer>
  <span><span class="status-dot"></span>System online</span>
  <span>© 2026 Kurtex by Rekka Software</span>
</footer>

<script src="/js/login.js"></script>
</body>
</html>
